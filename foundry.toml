[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
auto_detect_solc = false
solc_version = "0.8.36"
evm_version = "prague"

[invariant]
runs = 128
depth = 128
fail_on_revert = true

[lint]
lint_on_build = false
ignore = ["lib/**/*.sol"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
